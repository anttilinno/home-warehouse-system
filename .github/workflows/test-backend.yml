name: test-backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/test-backend.yml"
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/test-backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: go test
        run: cd backend && go test ./...
