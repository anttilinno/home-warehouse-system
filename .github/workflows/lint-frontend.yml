name: lint-frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - "scripts/check-forbidden-imports.mjs"
      - "scripts/__tests__/check-forbidden-imports.test.mjs"
      - "scripts/check-i18n-format.mjs"
      - "scripts/check-i18n-catalog.mjs"
      - "scripts/__tests__/check-i18n-format.test.mjs"
      - "scripts/__tests__/check-i18n-catalog.test.mjs"
      - "scripts/check-bundle-budget.mjs"
      - "scripts/__tests__/check-bundle-budget.test.mjs"
      - "frontend/bundle-budget.json"
      - ".github/workflows/lint-frontend.yml"
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - "scripts/check-forbidden-imports.mjs"
      - "scripts/__tests__/check-forbidden-imports.test.mjs"
      - "scripts/check-i18n-format.mjs"
      - "scripts/check-i18n-catalog.mjs"
      - "scripts/__tests__/check-i18n-format.test.mjs"
      - "scripts/__tests__/check-i18n-catalog.test.mjs"
      - "scripts/check-bundle-budget.mjs"
      - "scripts/__tests__/check-bundle-budget.test.mjs"
      - "frontend/bundle-budget.json"
      - ".github/workflows/lint-frontend.yml"

jobs:
  forbidden-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Run forbidden-imports grep guard
        run: node scripts/check-forbidden-imports.mjs
      - name: Run grep-guard self-tests
        run: node --test scripts/__tests__/check-forbidden-imports.test.mjs

  i18n-format-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      # Self-test always runs in isolation. The real-tree run passes once Phase 15
      # plan 15-01 has routed all date/time render sites through src/lib/format/.
      - name: Run i18n-format grep guard
        run: node scripts/check-i18n-format.mjs
      - name: Run i18n-format self-tests
        run: node --test scripts/__tests__/check-i18n-format.test.mjs

  i18n-catalog-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      # Self-test always runs in isolation. The real-tree run passes once Wave 2
      # (plans 15-03 / 15-04) has filled the et + ru translations to parity.
      - name: Run i18n-catalog self-tests
        run: node --test scripts/__tests__/check-i18n-catalog.test.mjs
      - name: Run i18n-catalog parity guard
        run: node scripts/check-i18n-catalog.mjs

  typecheck-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: cd frontend && bun install --frozen-lockfile
      - run: cd frontend && bun run lint:tsc

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: cd frontend && bun install --frozen-lockfile
      - run: cd frontend && bun run test --passWithNoTests

  bundle-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: cd frontend && bun install --frozen-lockfile
      # Self-tests prove the guard's own correctness (under/over/per-locale/missing).
      - name: Run bundle-budget self-tests
        run: node --test scripts/__tests__/check-bundle-budget.test.mjs
      # Build the real bundle (bare vite build — no backend, CI-cheap) and enforce
      # the per-chunk POL-04 budgets against frontend/dist/assets.
      - name: Build frontend bundle
        run: cd frontend && bunx vite build
      - name: Run bundle-budget guard
        run: node scripts/check-bundle-budget.mjs
