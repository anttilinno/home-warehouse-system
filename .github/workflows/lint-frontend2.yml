name: lint-frontend2

on:
  pull_request:
    paths:
      - "frontend2/**"
      - "scripts/check-forbidden-imports.mjs"
      - "scripts/__tests__/check-forbidden-imports.test.mjs"
      - ".github/workflows/lint-frontend2.yml"
  push:
    branches: [master]
    paths:
      - "frontend2/**"
      - "scripts/check-forbidden-imports.mjs"
      - "scripts/__tests__/check-forbidden-imports.test.mjs"
      - ".github/workflows/lint-frontend2.yml"

jobs:
  forbidden-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Run forbidden-imports grep guard
        run: node scripts/check-forbidden-imports.mjs
      - name: Run grep-guard self-tests
        run: node --test scripts/__tests__/check-forbidden-imports.test.mjs

  typecheck-frontend2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: cd frontend2 && bun install --frozen-lockfile
      - run: cd frontend2 && bun run lint:tsc

  test-frontend2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: cd frontend2 && bun install --frozen-lockfile
      - run: cd frontend2 && bun run test --passWithNoTests
