# ============================================================================
# Browser-level E2E for the full frontend/e2e/ suite, run against a REAL stack:
# postgres service + go backend + vite preview. All specs gate the merge
# EXCEPT the axe a11y sweep, which stays `continue-on-error: true` (flaky
# against third-party component internals we don't control). Every other
# spec (auth, items, inventory, loans, offline-replay, scan-lookup, etc.) is
# a hard gate.
#
# Does NOT touch lint-frontend.yml (17-01 owns it).
# ============================================================================
name: e2e-frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/e2e-frontend.yml"
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e-frontend.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest

    # Real Postgres for the backend to talk to. Credentials + DB name mirror the
    # CLAUDE.md runbook (wh/wh). dbmate applies migrations into warehouse_dev,
    # which the backend reads via GO_DATABASE_URL.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: wh
          POSTGRES_PASSWORD: wh
          POSTGRES_DB: warehouse_dev
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U wh -d warehouse_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      GO_DATABASE_URL: postgresql://wh:wh@localhost:5432/warehouse_dev?sslmode=disable
      DATABASE_URL: postgresql://wh:wh@localhost:5432/warehouse_dev?sslmode=disable
      DBMATE_DATABASE_URL: postgresql://wh:wh@localhost:5432/warehouse_dev?sslmode=disable
      E2E_USER: seeder@test.local
      E2E_PASS: password123
      # vite preview default port; specs read E2E_BASE_URL (playwright.config).
      E2E_BASE_URL: http://localhost:4173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      # --- migrations: dbmate up against the postgres service ------------------
      - name: Install dbmate
        run: |
          curl -fsSL -o /usr/local/bin/dbmate \
            https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
          chmod +x /usr/local/bin/dbmate
      - name: Apply migrations
        run: DATABASE_URL="$DBMATE_DATABASE_URL" dbmate -d backend/db/migrations up

      # --- seed: creates seeder@test.local + a workspace with items -----------
      - name: Seed dev database
        run: cd backend && go run ./cmd/seed/main.go all

      # --- backend: build + run on :8080 --------------------------------------
      # The image pipeline uses kolesa-team/go-webp, a cgo binding to libwebp.
      # Without the dev headers the backend fails to compile in CI with
      # `fatal error: webp/encode.h: No such file or directory`.
      - name: Install libwebp headers (cgo dep for go-webp)
        run: sudo apt-get update && sudo apt-get install -y libwebp-dev
      - name: Start Go backend (:8080)
        run: |
          cd backend
          go build -o /tmp/wh-server ./cmd/server
          PORT=8080 /tmp/wh-server &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            sleep 1
          done

      # --- frontend: build + vite preview on :4173 ----------------------------
      - name: Install frontend deps
        run: cd frontend && bun install --frozen-lockfile
      - name: Build frontend
        run: cd frontend && bun run build
      - name: Start vite preview (:4173)
        run: |
          cd frontend
          bun run preview --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/ && break
            sleep 1
          done

      # --- playwright: install chromium, run all specs --------------------------
      - name: Install Playwright chromium
        run: cd frontend && bunx playwright install --with-deps chromium
      - name: Run a11y sweep (best-effort)
        continue-on-error: true # flaky against third-party component internals
        run: |
          cd frontend
          bun run test:e2e --project=chromium e2e/a11y-sweep.spec.ts
      - name: Run E2E suite
        run: |
          cd frontend
          bun run test:e2e --project=chromium $(ls e2e/*.spec.ts | grep -v a11y-sweep.spec.ts)

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-frontend
          path: frontend/playwright-report/
          if-no-files-found: ignore
