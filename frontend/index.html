<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fdf6ec" />
    <!-- Dark Mode P1: set <html data-theme> BEFORE the bundle loads → zero FOUC,
         and it covers the pre-React login page. Mirrors src/lib/theme.ts
         (key "hws-theme", default "system" via prefers-color-scheme). -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("hws-theme");
          var resolved =
            p === "light" || p === "dark"
              ? p
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = resolved;
          if (resolved === "dark") {
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.content = "#15151b";
          }
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <title>Home Warehouse</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
