services:
  # ──────────────────────────────────────────────
  # Infrastructure (no profile — always starts)
  # ──────────────────────────────────────────────

  # Dev database — for local development (backend runs on host)
  postgres-dev:
    image: postgres:18
    container_name: warehouse-postgres-dev
    environment:
      POSTGRES_USER: wh
      POSTGRES_PASSWORD: wh
      POSTGRES_DB: warehouse_dev
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres-dev:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wh -d warehouse_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - warehouse

  redis:
    image: redis:latest
    container_name: warehouse-redis
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - warehouse

  # ──────────────────────────────────────────────
  # Code-graph store (profile: codegraph — opt-in, dev tooling only)
  # ──────────────────────────────────────────────

  # Postgres + pgvector backing the AI-assisted Go refactoring tool: holds the
  # symbol/edge graph (go/packages + go/types) and per-symbol embeddings for
  # semantic search over the backend. Kept separate from the app DBs. Start with
  # `docker compose --profile codegraph up -d postgres-codegraph`.
  postgres-codegraph:
    image: pgvector/pgvector:pg18
    container_name: warehouse-postgres-codegraph
    profiles: ["codegraph"]
    environment:
      POSTGRES_USER: wh
      POSTGRES_PASSWORD: wh
      POSTGRES_DB: codegraph
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"
    volumes:
      - ./.data/codegraph:/var/lib/postgresql/data
      - ./docker/codegraph:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wh -d codegraph"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - warehouse

  # Document management is provided by Paperless-ngx, which runs externally in
  # the homelab (k3s, behind Authelia) — not orchestrated here. The app talks to
  # it per-workspace via the REST API; see auth.workspace_paperless_settings and
  # internal/infra/paperless. (The former Docspell trio was removed in the DMS
  # migration; Docspell was never wired to the app.)

  # ──────────────────────────────────────────────
  # Production app services (profile: prod)
  # ──────────────────────────────────────────────

  # Prod database — separate container and volume from dev
  postgres-prod:
    image: postgres:18
    container_name: warehouse-postgres-prod
    profiles: ["prod"]
    environment:
      POSTGRES_USER: wh
      POSTGRES_PASSWORD: wh
      POSTGRES_DB: warehouse
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ./.data/postgres-prod:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wh -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - warehouse

  # One-shot migration runner
  migrate:
    image: ghcr.io/amacneil/dbmate:2
    profiles: ["prod"]
    depends_on:
      postgres-prod:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://wh:wh@postgres-prod:5432/warehouse?sslmode=disable"
    volumes:
      - ./backend/db/migrations:/db/migrations
    command: ["--wait", "--no-dump-schema", "migrate"]
    networks:
      - warehouse

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["prod"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://wh:wh@postgres-prod:5432/warehouse?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "change-me-in-production"
      DEBUG: "true"
      PHOTO_STORAGE_DIR: "/data/photos"
      APP_URL: "http://localhost"
      BACKEND_URL: "http://localhost"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
    volumes:
      - photo-storage:/data/photos
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - warehouse

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["prod"]
    command: ["./worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      GO_DATABASE_URL: "postgresql://wh:wh@postgres-prod:5432/warehouse?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      PHOTO_STORAGE_DIR: "/data/photos"
    volumes:
      - photo-storage:/data/photos
    networks:
      - warehouse

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["prod"]
    command: ["./scheduler"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://wh:wh@postgres-prod:5432/warehouse?sslmode=disable"
      REDIS_URL: "redis:6379"
      PHOTO_STORAGE_DIR: "/data/photos"
    volumes:
      - photo-storage:/data/photos
    networks:
      - warehouse

  # frontend — the v3.0 Retro OS SPA, served static by nginx on :3000. Angie
  # owns /api/* → backend; this container only serves the bundle. (frontend1 was
  # retired 2026-06-14; the service name stays `frontend` so the Angie upstream
  # + healthcheck are unchanged.)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    profiles: ["prod"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - warehouse

  angie:
    image: docker.angie.software/angie:latest
    profiles: ["prod"]
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/angie/angie.conf:/etc/angie/angie.conf:ro
      - ./docker/angie/proxy_params.conf:/etc/angie/proxy_params.conf:ro
      - ./.data/certs:/etc/angie/certs:ro
    networks:
      - warehouse

networks:
  warehouse:
    driver: bridge

volumes:
  photo-storage:
