worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/angie/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    client_max_body_size 20M;

    # Upstream definitions
    upstream backend {
        server backend:8080;
    }

    # frontend — the Retro OS SPA (static nginx on :3000). frontend1 retired
    # 2026-06-14; this is the only frontend now.
    upstream frontend {
        server frontend:3000;
    }

    # --- s.go QR shortlink virtual host ---
    # Printed QR labels encode s.go/<short_code>. These two server blocks rewrite
    # the bare code path to the backend redirect handler at /r/{code} (registered
    # at the top-level chi router, OFF the /api/{wsId} tree) and proxy to the
    # backend upstream. The handler authenticates via the access_token cookie and
    # 302-redirects to the resolved dashboard page (or the claim wizard).
    # NOTE: DNS for s.go is out of scope here — see docs/QR-URL-SHORTENING.md
    # (DNS section). The host must resolve to this proxy for the rewrite to fire.
    server {
        listen 80;
        server_name s.go;

        include /etc/angie/proxy_params.conf;

        location / {
            rewrite ^/(.+)$ /r/$1 break;
            proxy_pass http://backend;
        }
    }

    server {
        listen 443 ssl;
        server_name s.go;

        ssl_certificate     /etc/angie/certs/server.crt;
        ssl_certificate_key /etc/angie/certs/server.key;

        include /etc/angie/proxy_params.conf;

        location / {
            rewrite ^/(.+)$ /r/$1 break;
            proxy_pass http://backend;
        }
    }

    # ---------------------------------------------------------------------------
    # Routing model (frontend): the SPA calls the backend through a frontend-only
    # `/api` prefix (the Vite dev proxy strips it; in prod Angie does). So:
    #   * /api/*  → strip /api → backend  (auth, users, workspaces, oauth, …)
    #   * the SSE stream needs unbuffered + long-timeout proxying
    #   * Authelia SSO uses the BARE /auth/authelia/ path (build-gated, off by default)
    #   * everything else → the SPA (incl. the /auth/callback client route)
    # ---------------------------------------------------------------------------

    # HTTP → redirect to HTTPS (when accessed via LAN IP)
    server {
        listen 80;
        server_name _;

        # Allow plain HTTP on localhost for convenience
        set $do_redirect 0;
        if ($host != "localhost") {
            set $do_redirect 1;
        }
        if ($host != "127.0.0.1") {
            set $do_redirect "${do_redirect}1";
        }
        if ($do_redirect = "11") {
            return 301 https://$host$request_uri;
        }

        include /etc/angie/proxy_params.conf;

        # SSE — long-lived, unbuffered. Regex beats the /api/ prefix below.
        location ~ ^/api/workspaces/.+/sse$ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Photo/media URLs returned by the backend carry an /api/v1 prefix —
        # strip the whole /api/v1 (longest-prefix wins over /api/ below).
        location /api/v1/ {
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass http://backend;
        }

        # All other API calls — strip the frontend-only /api prefix.
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
        }

        # Authelia SSO bounce uses the bare ingress path (build-gated, off by default).
        location /auth/authelia/ {
            proxy_pass http://backend;
        }

        # Operational backend endpoints kept at bare paths.
        location = /health { proxy_pass http://backend; }
        location = /docs { proxy_pass http://backend; }
        location = /redoc { proxy_pass http://backend; }
        location = /openapi.json { proxy_pass http://backend; }

        # Frontend SPA (everything else, incl. the /auth/callback client route).
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS server — required for PWA/SW on non-localhost (phone testing)
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/angie/certs/server.crt;
        ssl_certificate_key /etc/angie/certs/server.key;

        include /etc/angie/proxy_params.conf;

        location ~ ^/api/workspaces/.+/sse$ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /api/v1/ {
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass http://backend;
        }

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
        }

        location /auth/authelia/ {
            proxy_pass http://backend;
        }

        location = /health { proxy_pass http://backend; }
        location = /docs { proxy_pass http://backend; }
        location = /redoc { proxy_pass http://backend; }
        location = /openapi.json { proxy_pass http://backend; }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
