worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/angie/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    client_max_body_size 20M;

    # Upstream definitions
    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:3000;
    }

    # HTTP → redirect to HTTPS (when accessed via LAN IP)
    server {
        listen 80;
        server_name _;

        # Allow plain HTTP on localhost for convenience
        set $do_redirect 0;
        if ($host != "localhost") {
            set $do_redirect 1;
        }
        if ($host != "127.0.0.1") {
            set $do_redirect "${do_redirect}1";
        }
        if ($do_redirect = "11") {
            return 301 https://$host$request_uri;
        }

        include /etc/angie/proxy_params.conf;

        # --- Backend API routes ---

        # OAuth callback → frontend (must be before /auth/ backend catch-all)
        location = /auth/callback {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
        }

        # Auth endpoints
        location /auth/ {
            proxy_pass http://backend;
        }

        # Health check
        location = /health {
            proxy_pass http://backend;
        }

        # User endpoints
        location /users/ {
            proxy_pass http://backend;
        }

        # Workspace endpoints (includes SSE at /workspaces/{id}/sse)
        location /workspaces/ {
            proxy_pass http://backend;
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # API docs
        location = /docs {
            proxy_pass http://backend;
        }

        location = /redoc {
            proxy_pass http://backend;
        }

        location = /openapi.json {
            proxy_pass http://backend;
        }

        # Barcode lookup
        location /barcode/ {
            proxy_pass http://backend;
        }

        # Notifications
        location /notifications/ {
            proxy_pass http://backend;
        }

        # Push subscriptions
        location /push/ {
            proxy_pass http://backend;
        }

        # Photo URLs use /api/v1/ prefix — strip it and forward to backend
        location /api/v1/ {
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass http://backend;
        }

        # --- Frontend (everything else) ---
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS server — required for PWA/SW on non-localhost (phone testing)
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/angie/certs/server.crt;
        ssl_certificate_key /etc/angie/certs/server.key;

        include /etc/angie/proxy_params.conf;

        # --- Backend API routes ---

        location = /auth/callback {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
        }

        location /auth/ {
            proxy_pass http://backend;
        }

        location = /health {
            proxy_pass http://backend;
        }

        location /users/ {
            proxy_pass http://backend;
        }

        location /workspaces/ {
            proxy_pass http://backend;
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location = /docs {
            proxy_pass http://backend;
        }

        location = /redoc {
            proxy_pass http://backend;
        }

        location = /openapi.json {
            proxy_pass http://backend;
        }

        location /barcode/ {
            proxy_pass http://backend;
        }

        location /notifications/ {
            proxy_pass http://backend;
        }

        location /push/ {
            proxy_pass http://backend;
        }

        location /api/v1/ {
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass http://backend;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
