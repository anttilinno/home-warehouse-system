# Static SPA server for the built Vite app (frontend2), fronted by Angie.
# Angie proxies /api/* to the backend and handles the s.go shortlink; this
# server only serves the SPA bundle with a history-API fallback to index.html.
server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the content-hashed assets Vite emits; never cache the HTML
    # shell or the service worker so deploys take effect immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA history fallback — every unmatched path renders the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
