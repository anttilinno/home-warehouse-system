<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sketch 007 — Retro OS Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../themes/retro-os.css" />
<style>
  body {
    display: grid;
    place-items: center;
    min-height: 100vh;
  }
  /* faint oversized brand watermark behind the window */
  .watermark {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    pointer-events: none;
    font-family: var(--font-display);
    font-size: clamp(64px, 14vw, 180px);
    color: rgba(38, 38, 46, 0.045);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    user-select: none;
  }
  .login {
    width: min(400px, calc(100vw - 32px));
    position: relative;
  }
  .login .window-body { padding: var(--sp-5); display: grid; gap: var(--sp-4); }
  .brandline {
    text-align: center;
    font-family: var(--font-display);
    font-size: 20px;
    margin-bottom: var(--sp-2);
  }
  .brandline .accent { color: var(--accent-pink-deep); }
  .brandline small {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 0.12em;
    margin-top: 4px;
    text-transform: uppercase;
  }
  .error {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    border: 2px solid var(--danger);
    background: var(--danger-bg);
    color: var(--danger);
    font-size: 13px;
    font-weight: 600;
    padding: var(--sp-2) var(--sp-3);
  }
  .actions { display: grid; gap: var(--sp-2); }
  .actions .btn { justify-content: center; padding: 9px 14px; }
  .divider {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    color: var(--fg-muted);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    border-top: 1px dotted var(--fg-faint);
  }
  .statusbar {
    display: flex;
    justify-content: space-between;
    border-top: 2px solid var(--border-ink);
    background: var(--bg-panel-2);
    padding: 4px var(--sp-3);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
  }
</style>
</head>
<body>

<div class="watermark">WAREHOUSE.SYS</div>

<div class="window login">
  <div class="titlebar">
    <div class="wbox"></div>
    <span class="title">Log in</span>
    <div class="wbox"></div>
  </div>

  <div class="window-body">
    <div class="brandline">
      WAREHOUSE<span class="accent">.SYS</span>
      <small>home inventory terminal · v3.0</small>
    </div>

    <!-- toggle by adding/removing this block: error state under test -->
    <div class="error">✕ Wrong email or password. Try again.</div>

    <div>
      <label class="field-label" for="email">Email</label>
      <input class="input input--mono" id="email" type="email" value="seeder@test.local" />
    </div>

    <div>
      <label class="field-label" for="pw">Password</label>
      <input class="input input--mono input--error" id="pw" type="password" value="hunter2" />
    </div>

    <div class="actions">
      <button class="btn btn--primary" type="submit">Log in</button>
      <div class="divider">or</div>
      <button class="btn" type="button">Sign in with Google</button>
    </div>
  </div>

  <div class="statusbar">
    <span>caps lock: off</span>
    <span id="t">--:--</span>
  </div>
</div>

<script>
  const t = document.getElementById("t");
  const tick = () => { t.textContent = new Date().toLocaleTimeString("et-EE").slice(0, 5); };
  tick(); setInterval(tick, 30_000);
</script>
</body>
</html>
