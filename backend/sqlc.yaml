version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/"
    schema: "db/migrations/"
    gen:
      go:
        package: "queries"
        out: "internal/infra/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          # pg_dump spells the type out as "timestamp with time zone", which
          # sqlc canonicalizes to pg_catalog.timestamptz — must be overridden
          # separately from the bare "timestamptz" alias above.
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
